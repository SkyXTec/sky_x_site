<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfólio - SKY X</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Veja nossos projetos de realidade virtual e desenvolvimento de software. Portfólio completo SKY X Tecnologia."
    />
    <meta
      name="keywords"
      content="portfólio, projetos, realidade virtual, desenvolvimento, SKY X"
    />
    <link rel="icon" type="image/png" href="assets/images/logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Roboto+Condensed:wght@200;300;400;700&display=swap"
      rel="stylesheet"
    />

    <!-- css -->
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/portfolio-page.css" />
  </head>
  <body class="portfolio-body">
    <!-- Header fixo -->
    <header class="page-header" id="pageHeader">
      <a href="index.html" class="back-link">← Voltar</a>
      <h1 class="page-title">portfólio</h1>
      <div class="project-counter" id="projectCounter">
        <span id="currentProjectNum">01</span>
        <span class="counter-sep">/</span>
        <span id="totalProjectNum">01</span>
      </div>
    </header>

    <!-- Área de scroll dos projetos (populada pelo JS) -->
    <div class="portfolio-scroll-wrap" id="portfolioScrollWrap">
      <div class="portfolio-loading">
        <span>Carregando projetos...</span>
      </div>
    </div>

    <!-- Dots de navegação (lado direito) -->
    <nav
      class="project-dots-nav"
      id="projectDotsNav"
      aria-label="Navegação de projetos"
    ></nav>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" style="display: none">
      <div class="lightbox-content" id="lightboxContent">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
      </div>
    </div>

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>

    <!-- JavaScript -->
    <script src="js/portfolio-page.js"></script>
  </body>
</html>
