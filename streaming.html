<!doctype html>
<html lang="pt-BR" class="no-js">
  <head>
    <script>
      // Remover classe no-js imediatamente se JS estiver habilitado
      document.documentElement.classList.remove('no-js');
      document.documentElement.classList.add('js-enabled');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SKY X - Tecnologia e Inovação</title>

    <meta name="description" content="SKY X - Soluções inovadoras em realidade virtual, desenvolvimento de software e experiências imersivas. Transformando ideias em tecnologia.">

    <meta name="author" content="SKY X Tecnologia">
    <!-- Nota: Criar arquivo favicon.png e apple-touch-icon.png na pasta assets/icons/ -->
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="apple-touch-icon" href="assets/images/logo.png">

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://skyxtecnologia.com.br/">
    <meta property="og:title" content="SKY X - Tecnologia e Inovação em Realidade Virtual">
    <meta property="og:description" content="Transformamos ideias em experiências digitais inovadoras através de realidade virtual e desenvolvimento de software.">
    <!-- Nota: Criar arquivo og-image.jpg (1200x630px) na pasta assets/images/ -->
    <meta property="og:image" content="https://skyxtecnologia.com.br/assets/images/img-hero.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter Cards -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://skyxtecnologia.com.br/">
    <meta property="twitter:title" content="SKY X - Tecnologia e Inovação">
    <meta property="twitter:description" content="Transformando ideias em experiências digitais inovadoras">
    <meta property="twitter:image" content="https://skyxtecnologia.com.br/assets/images/img-hero.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Roboto+Condensed:wght@200;300;400&display=swap"
      rel="stylesheet"
    />

    <!-- Main css -->
    <link rel="stylesheet" href="css/main.css?v=2" />
    <link rel="stylesheet" href="CSS/streaming-page.css" />

        <div class="main-player">

              class="video-box"
